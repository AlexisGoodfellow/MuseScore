<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>MuseScoreStudio</title>
    <style>
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100%; background: #2D2D30; }
      #spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #EBEBEB;
      }
      #screen { width: 100%; height: 100%; }
    </style>
  </head>
  <body>

    <figure id="spinner">
      <center style="margin-top:1.5em; line-height:150%">
        <strong>MuseScoreStudio</strong>
        <div id="status"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>

    <div id="screen"></div>

    <!-- <div id="panel">
      <button onclick="onclickTest1()">Test 1</button>
      <button>Test 2</button>
      <button>Test 3</button>
      <input id="load_file" type="file" onchange="window.muapi.loadScoreFile(this.files[0])">
    </div> -->

    <script type="module">
      import createMuApi from "./distr/muapi.js";

      const spinner = document.querySelector('#spinner');
      const screen = document.querySelector('#screen');
      const status = document.querySelector('#status');

      const showUi = (ui) => {
          [spinner, screen].forEach(element => element.style.display = 'none');
          if (screen === ui)
              screen.style.position = 'default';
          ui.style.display = 'block';
      }

      try {

        showUi(spinner);
        status.innerHTML = 'Loading...';
        console.log("[viewer] module script running, MuseScoreStudio_entry:", typeof window.MuseScoreStudio_entry);
        console.log("[viewer] editudeSession:", window.editudeSession ? "present" : "absent");

        window.muapi = await createMuApi({

          // properties
          screen: screen,

          // runtime
          onLoaded: () => {
            showUi(screen);
            // [editude] Notify iOS shell that the WASM app is painting.
            // Dismisses the "Synchronizing..." spinner independently of
            // C++ EditudeService bootstrap (which may still be loading the score).
            if (window.webkit && window.webkit.messageHandlers &&
                window.webkit.messageHandlers.wasmReady) {
              window.webkit.messageHandlers.wasmReady.postMessage("ready");
            }
          },
          onExit: function(exitData) {
            status.innerHTML = 'Application exit';
            status.innerHTML += exitData.code !== undefined ? ` with code ${exitData.code}` : '';
            status.innerHTML += exitData.text !== undefined ? ` (${exitData.text})` : '';
            showUi(spinner);
          },

          // api callbacks
          onProjectSaved: function(data) {
            console.log("[html] onProjectSaved len: ", data.length)
          }   
        })

        console.log("[viewer] createMuApi resolved — WASM loaded");
        document.addEventListener('click', window.muapi.startAudioProcessing, { once: true });

        // [editude] Pinch-to-zoom for touch devices.
        // Uses capture phase on #screen so we intercept 2-finger touches before
        // Qt's canvas event handlers. Works in both browser and iOS WKWebView.
        (function() {
          let baseZoom = 100;
          let initialDist = 0;
          let lastZoom = 100;

          function dist(a, b) {
            const dx = a.clientX - b.clientX;
            const dy = a.clientY - b.clientY;
            return Math.sqrt(dx * dx + dy * dy);
          }

          screen.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
              initialDist = dist(e.touches[0], e.touches[1]);
              baseZoom = lastZoom;
              e.preventDefault();
              e.stopPropagation();
            }
          }, { capture: true, passive: false });

          screen.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2 && initialDist > 0) {
              const d = dist(e.touches[0], e.touches[1]);
              const scale = d / initialDist;
              const z = Math.max(25, Math.min(400, Math.round(baseZoom * scale)));
              if (z !== lastZoom && window.muapi && window.muapi._webSetZoom) {
                window.muapi._webSetZoom(z);
                lastZoom = z;
              }
              e.preventDefault();
              e.stopPropagation();
            }
          }, { capture: true, passive: false });

          screen.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) initialDist = 0;
          }, { capture: true });

          console.log("[viewer] pinch-to-zoom JS handler installed (capture phase on #screen)");
        })();
    } catch (e) {
        console.error("[viewer] FATAL:", e);
        console.error(e.stack);
    }
    </script>
    <script src="MuseScoreStudio.js"></script> 
  </body>
</html>
